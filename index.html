<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="apple-touch-icon" href="/logo-icon-light.png">
    <!-- Tailwind CSS CDN -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Upgraded smart image compressor to preserve original PNG transparency channel
        const compressImage = (base64Str, maxWidth, maxHeight, callback) => {
            const img = new Image();
            img.src = base64Str;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > height) {
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = Math.round((width * maxHeight) / height);
                        height = maxHeight;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // Clear canvas with transparent pixels (crucial for PNG)
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(img, 0, 0, width, height);
                
                // Detect original image format to preserve PNG alpha transparency
                const isPng = base64Str.startsWith('data:image/png') || base64Str.startsWith('data:image/gif');
                if (isPng) {
                    callback(canvas.toDataURL('image/png'));
                } else {
                    callback(canvas.toDataURL('image/jpeg', 0.8));
                }
            };
        };

        function App() {
            // Mobile View State Management ('edit' or 'preview')
            const [activeTab, setActiveTab] = useState('edit');

            // State (Locked with automatic LocalStorage recovery for seamless UX)
            const [logo, setLogo] = useState(() => localStorage.getItem('jy_logo') || null);
            const [paymentQr, setPaymentQr] = useState(() => localStorage.getItem('jy_payment_qr') || null);
            
            const [senderName, setSenderName] = useState(() => localStorage.getItem('jy_senderName') || 'Chong Jing Yee');
            const [senderContact, setSenderContact] = useState(() => localStorage.getItem('jy_senderContact') || 'rainchong03@gmail.com | +6014-3486463');
            
            const [invoiceNo, setInvoiceNo] = useState('INV-2026-002');
            const [invoiceDate, setInvoiceDate] = useState('2026-07-21');
            const [paymentTerms, setPaymentTerms] = useState('Due Upon Receipt (Within 7 Days)');
            
            const [clientName, setClientName] = useState('Shiftix Sdn Bhd');
            const [clientAddress, setClientAddress] = useState('53, Jalan Bestari 2B, Bandar Bestari, 41200 Klang, Selangor.');
            const [clientTin, setClientTin] = useState('202301019899');
            
            const [items, setItems] = useState([
                { id: 1, description: 'Google Paid Ads\n- Ad Campaign Setup & Optimization for Shiftix Project', qty: 1, unitPrice: 500 }
            ]);
            
            const [bankName, setBankName] = useState(() => localStorage.getItem('jy_bankName') || 'Public Bank');
            const [bankAccName, setBankAccName] = useState(() => localStorage.getItem('jy_bankAccName') || 'Chong Jing Yee');
            const [bankAccNo, setBankAccNo] = useState(() => localStorage.getItem('jy_bankAccNo') || '4571382026');
            
            const [currency, setCurrency] = useState('MYR');
            const [taxRate, setTaxRate] = useState(0);

            // Sync text inputs to LocalStorage
            useEffect(() => {
                localStorage.setItem('jy_senderName', senderName);
                localStorage.setItem('jy_senderContact', senderContact);
                localStorage.setItem('jy_bankName', bankName);
                localStorage.setItem('jy_bankAccName', bankAccName);
                localStorage.setItem('jy_bankAccNo', bankAccNo);
            }, [senderName, senderContact, bankName, bankAccName, bankAccNo]);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        compressImage(reader.result, 300, 150, (compressed) => {
                            setLogo(compressed);
                            localStorage.setItem('jy_logo', compressed);
                        });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleQrUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        compressImage(reader.result, 400, 400, (compressed) => {
                            setPaymentQr(compressed);
                            localStorage.setItem('jy_payment_qr', compressed);
                        });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleAddItem = () => {
                setItems([...items, { id: Date.now(), description: 'New Service Item', qty: 1, unitPrice: 0 }]);
            };

            const handleUpdateItem = (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const handleDeleteItem = (id) => {
                if (items.length > 1) setItems(items.filter(item => item.id !== id));
            };

            const subtotal = items.reduce((sum, item) => sum + (item.qty * item.unitPrice), 0);
            const taxAmount = (subtotal * taxRate) / 100;
            const totalPayable = subtotal + taxAmount;

            const loadShiftixPreset = () => {
                setClientName('Shiftix Sdn Bhd');
                setClientAddress('53, Jalan Bestari 2B, Bandar Bestari, 41200 Klang, Selangor');
                setClientTin('202301019899');
                setItems([{ id: 1, description: 'Google Paid Ads\n- Ad Campaign Setup & Optimization for Shiftix Project', qty: 1, unitPrice: 500 }]);
                setInvoiceNo('INV-2026-002');
                setInvoiceDate('2026-07-21');
                setPaymentTerms('Due Upon Receipt (Within 7 Days)');
            };

            const clearForm = () => {
                setClientName('');
                setClientAddress('');
                setClientTin('');
                setItems([{ id: Date.now(), description: '', qty: 1, unitPrice: 0 }]);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Top Bar - Dynamic Actions */}
                    <header className="bg-slate-950 border-b border-slate-800 py-4 px-6 flex justify-between items-center no-print sticky top-0 z-50">
                        <div className="flex items-center space-x-3">
                            <div className="bg-blue-600 p-2.5 rounded-lg text-white font-extrabold text-xs tracking-wider">R</div>
                            <div>
                                <h1 className="text-sm font-bold text-slate-100 tracking-tight">Invoice Generator</h1>
                            </div>
                        </div>
                        <div className="flex items-center space-x-2 sm:space-x-3">
                            <button onClick={loadShiftixPreset} className="flex items-center space-x-1 bg-indigo-950 hover:bg-indigo-900 text-indigo-200 px-2.5 sm:px-3.5 py-2 rounded-lg text-xs border border-indigo-800 font-medium transition-all shadow-sm">
                                <svg className="w-3.5 h-3.5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                                <span className="hidden sm:inline">Load Preset</span>
                                <span className="sm:hidden">Preset</span>
                            </button>
                            <button onClick={() => window.print()} className="flex items-center space-x-1.5 bg-emerald-600 hover:bg-emerald-500 text-white px-3 sm:px-4.5 py-2 rounded-lg text-xs font-semibold shadow-md shadow-emerald-950/25 transition-all">
                                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-3a2 2 0 00-2-2H9a2 2 0 00-2 2v3a2 2 0 002 2zm5-17V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v3" />
                                </svg>
                                <span>PDF / Print</span>
                            </button>
                        </div>
                    </header>

                    {/* Main Interface Layout */}
                    <div className="flex-1 flex flex-col lg:flex-row print:block">
                        
                        {/* LEFT FORM SIDEBAR */}
                        <aside className={`w-full lg:w-[38%] bg-slate-950 p-6 space-y-5 overflow-y-auto max-h-[calc(100vh-65px)] lg:max-h-[calc(100vh-65px)] border-r border-slate-800 no-print pb-24 lg:pb-6 ${activeTab === 'edit' ? 'block' : 'hidden'} lg:block`}>
                            
                            {/* Panel 1: Sender Profile */}
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                <div className="flex items-center space-x-2 border-b border-slate-800 pb-2">
                                    <span className="text-blue-500 text-xs font-extrabold uppercase">1.</span>
                                    <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300">My Info (Sender)</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-[10px] text-slate-400 mb-0.5">My Name</label>
                                        <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-blue-500 transition-all" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400 mb-0.5">Contact Details</label>
                                        <input type="text" value={senderContact} onChange={(e) => setSenderContact(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2.5 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-blue-500 transition-all" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pt-1">
                                    <div>
                                        <label className="block text-[10px] text-slate-400 mb-1">My Custom Logo</label>
                                        <div className="flex items-center space-x-2">
                                            <label className="cursor-pointer bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-300 px-3 py-1.5 rounded text-[11px] font-semibold transition-all">
                                                <span>Upload Logo</span>
                                                <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                                            </label>
                                            {logo && (
                                                <button onClick={() => { setLogo(null); localStorage.removeItem('jy_logo'); }} className="text-red-500 hover:text-red-400 text-[10px] font-medium">Remove</button>
                                            )}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400 mb-1">TNG/DuitNow QR Code</label>
                                        <div className="flex items-center space-x-2">
                                            <label className="cursor-pointer bg-slate-950 hover:bg-slate-800 border border-slate-800 text-slate-300 px-3 py-1.5 rounded text-[11px] font-semibold transition-all">
                                                <span>Upload QR</span>
                                                <input type="file" accept="image/*" onChange={handleQrUpload} className="hidden" />
                                            </label>
                                            {paymentQr && (
                                                <button onClick={() => { setPaymentQr(null); localStorage.removeItem('jy_payment_qr'); }} className="text-red-500 hover:text-red-400 text-[10px] font-medium">Remove</button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Panel 2: Client Profile */}
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                <div className="flex items-center space-x-2 border-b border-slate-800 pb-2">
                                    <span className="text-blue-500 text-xs font-extrabold uppercase">2.</span>
                                    <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300">Client & Invoice Setup</h2>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Invoice No</label>
                                        <input type="text" value={invoiceNo} onChange={(e) => setInvoiceNo(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Invoice Date</label>
                                        <input type="date" value={invoiceDate} onChange={(e) => setInvoiceDate(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs text-white" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Terms</label>
                                        <input type="text" value={paymentTerms} onChange={(e) => setPaymentTerms(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs" />
                                    </div>
                                </div>
                                <div className="space-y-2.5 pt-2 border-t border-slate-800">
                                    <div className="flex justify-between items-center">
                                        <label className="block text-[10px] text-slate-400 font-bold uppercase">Client Details</label>
                                        <button onClick={clearForm} className="text-red-400 hover:text-red-300 text-[10px]">Clear</button>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Company Name</label>
                                        <input type="text" value={clientName} onChange={(e) => setClientName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Reg No / TIN</label>
                                        <input type="text" value={clientTin} onChange={(e) => setClientTin(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Billing Address</label>
                                        <textarea value={clientAddress} onChange={(e) => setClientAddress(e.target.value)} rows="2" className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs resize-none" />
                                    </div>
                                </div>
                            </div>

                            {/* Panel 3: Services & Rates */}
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                    <div className="flex items-center space-x-2">
                                        <span className="text-blue-500 text-xs font-extrabold">3.</span>
                                        <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300">Services Details</h2>
                                    </div>
                                    <button onClick={handleAddItem} className="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded transition-all">+ Add Service</button>
                                </div>
                                <div className="space-y-3">
                                    {items.map((item, index) => (
                                        <div key={item.id} className="bg-slate-950 p-2.5 rounded border border-slate-800 space-y-1.5 relative">
                                            <div className="flex justify-between items-center text-[10px] text-slate-500 font-bold">
                                                <span>Item #{index + 1}</span>
                                                {items.length > 1 && <button onClick={() => handleDeleteItem(item.id)} className="text-red-500 hover:text-red-400">Delete</button>}
                                            </div>
                                            <textarea value={item.description} onChange={(e) => handleUpdateItem(item.id, 'description', e.target.value)} rows="2" className="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 text-xs resize-none text-slate-200 animate-none" />
                                            <div className="grid grid-cols-2 gap-2">
                                                <div>
                                                    <label className="block text-[9px] text-slate-500">Qty</label>
                                                    <input type="number" value={item.qty} onChange={(e) => handleUpdateItem(item.id, 'qty', parseInt(e.target.value) || 1)} className="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 text-xs" />
                                                </div>
                                                <div>
                                                    <label className="block text-[9px] text-slate-500">Unit Price</label>
                                                    <input type="number" step="0.01" value={item.unitPrice} onChange={(e) => handleUpdateItem(item.id, 'unitPrice', parseFloat(e.target.value) || 0)} className="w-full bg-slate-900 border border-slate-800 rounded px-2 py-1 text-xs" />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-2 pt-2 border-t border-slate-800">
                                    <select value={currency} onChange={(e) => setCurrency(e.target.value)} className="bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs text-white">
                                        <option value="MYR">MYR (RM)</option>
                                        <option value="USD">USD ($)</option>
                                        <option value="SGD">SGD (S$)</option>
                                    </select>
                                    <select value={taxRate} onChange={(e) => setTaxRate(parseInt(e.target.value))} className="bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs text-white">
                                        <option value={0}>0% Tax (Exempted)</option>
                                        <option value={6}>6% SST</option>
                                    </select>
                                </div>
                            </div>

                            {/* Panel 4: Payment Target */}
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-3">
                                <div className="flex items-center space-x-2 border-b border-slate-800 pb-2">
                                    <span className="text-blue-500 text-xs font-extrabold uppercase">4.</span>
                                    <h2 className="text-xs font-bold uppercase tracking-wider text-slate-300">Bank Transfer Details</h2>
                                </div>
                                <div className="space-y-2">
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Bank Name</label>
                                        <input type="text" value={bankName} onChange={(e) => setBankName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Account Holder Name</label>
                                        <input type="text" value={bankAccName} onChange={(e) => setBankAccName(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] text-slate-400">Account Number</label>
                                        <input type="text" value={bankAccNo} onChange={(e) => setBankAccNo(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded px-2 py-1 text-xs font-mono" />
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* RIGHT LIVE A4 PRINT CANVAS */}
                        <main className={`flex-1 bg-slate-800 overflow-y-auto p-4 sm:p-6 lg:p-12 flex justify-center print:p-0 print:bg-white print:overflow-visible pb-24 lg:pb-12 ${activeTab === 'preview' ? 'flex' : 'hidden'} lg:flex`}>
                            {/* Overflow wrapper to prevent horizontal clipping on tiny screens */}
                            <div className="w-full overflow-x-auto flex justify-start sm:justify-center">
                                <div className="print-container bg-white text-black w-full min-w-[320px] max-w-[210mm] min-h-[297mm] p-6 sm:p-[15mm] print:p-[15mm] shadow-2xl rounded-sm print:shadow-none flex flex-col justify-between">
                                    <div>
                                        {/* Document Header */}
                                        <div className="flex justify-between items-start border-b-2 border-slate-900 pb-5 mb-6">
                                            <div>
                                                {logo ? (
                                                    <img src={logo} className="max-h-14 max-w-[120px] sm:max-w-40 print:max-w-40 object-contain mb-2" />
                                                ) : (
                                                    <div className="text-slate-400 text-[10px] italic border border-dashed border-slate-300 p-2 mb-2 inline-block no-print rounded">
                                                        [ Place Logo Here ]
                                                    </div>
                                                )}
                                                <div className="font-extrabold text-sm sm:text-base print:text-base text-slate-900 tracking-tight">{senderName}</div>
                                                <div className="text-[10px] sm:text-[11px] print:text-[11px] text-slate-600 mt-1 space-y-0.5">
                                                    <div>Contact: {senderContact}</div>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <h1 className="text-2xl sm:text-3xl print:text-3xl font-black text-slate-900 uppercase tracking-tight">Invoice</h1>
                                                <div className="text-[10px] sm:text-[11px] print:text-[11px] text-slate-600 mt-3 space-y-0.5">
                                                    <div>No: <span className="font-bold text-slate-900 font-mono">{invoiceNo}</span></div>
                                                    <div>Date: {invoiceDate}</div>
                                                    <div>Terms: {paymentTerms}</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Billing Metadata Grid */}
                                        <div className="bg-slate-50 border border-slate-200 p-3.5 rounded mb-6 grid grid-cols-2 gap-3">
                                            <div>
                                                <div className="text-[9px] uppercase font-bold text-slate-400 mb-0.5">Bill To (Client):</div>
                                                <div className="font-bold text-slate-900 text-xs sm:text-sm print:text-sm">{clientName || '---'}</div>
                                                <div className="text-[10px] sm:text-[11px] print:text-[11px] text-slate-600 mt-1 whitespace-pre-line leading-relaxed">{clientAddress}</div>
                                                {clientTin && <div className="text-[9px] sm:text-[10px] print:text-[10px] text-slate-500 mt-1">Reg/TIN: {clientTin}</div>}
                                            </div>
                                            <div className="text-right flex flex-col justify-end border-l border-slate-200 pl-3">
                                                <div className="text-[9px] uppercase font-bold text-slate-400">Category:</div>
                                                <div className="text-[10px] sm:text-[11px] print:text-[11px] font-bold text-slate-800 mt-0.5">Freelance Services</div>
                                                <div className="text-[9px] uppercase font-bold text-slate-400 mt-2">SST Treatment:</div>
                                                <div className="text-[9px] sm:text-[10px] print:text-[10px] text-slate-500 mt-0.5 italic">Exempted / Not Registered</div>
                                            </div>
                                        </div>

                                        {/* Services Line Items Table */}
                                        <div className="overflow-x-auto print:overflow-visible">
                                            <table className="w-full text-left text-[10px] sm:text-xs print:text-xs mb-6 min-w-[500px] sm:min-w-0 print:min-w-0">
                                                <thead>
                                                    <tr className="bg-slate-900 text-white font-bold">
                                                        <th className="p-2.5 text-center w-10">No.</th>
                                                        <th className="p-2.5">Description</th>
                                                        <th className="p-2.5 text-center w-12">Qty</th>
                                                        <th className="p-2.5 text-right w-24">Unit Price</th>
                                                        <th className="p-2.5 text-right w-28">Amount</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100 text-[10px] sm:text-[11px] print:text-[11px]">
                                                    {items.map((item, index) => (
                                                        <tr key={item.id} className="hover:bg-slate-50/50">
                                                            <td className="p-2.5 text-center text-slate-400">{index + 1}</td>
                                                            <td className="p-2.5 text-slate-800 whitespace-pre-line leading-relaxed font-normal">{item.description}</td>
                                                            <td className="p-2.5 text-center">{item.qty}</td>
                                                            <td className="p-2.5 text-right font-mono">{item.unitPrice.toFixed(2)}</td>
                                                            <td className="p-2.5 text-right font-bold text-slate-950 font-mono">{(item.qty * item.unitPrice).toFixed(2)}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* Pricing Summary */}
                                        <div className="flex justify-end mb-6">
                                            <table className="w-full sm:w-64 print:w-64 text-[10px] sm:text-xs print:text-xs">
                                                <tbody>
                                                    <tr className="border-b border-slate-100">
                                                        <td className="py-1.5 text-slate-500">Subtotal:</td>
                                                        <td className="py-1.5 text-right font-mono font-medium">{currency} {subtotal.toFixed(2)}</td>
                                                    </tr>
                                                    {taxAmount > 0 && (
                                                        <tr className="border-b border-slate-100">
                                                            <td className="py-1.5 text-slate-500">SST ({taxRate}%):</td>
                                                            <td className="py-1.5 text-right font-mono font-medium">{currency} {taxAmount.toFixed(2)}</td>
                                                        </tr>
                                                    )}
                                                    <tr className="bg-slate-100 font-bold text-xs sm:text-sm print:text-sm">
                                                        <td className="p-2 text-slate-900">TOTAL:</td>
                                                        <td className="p-2 text-right font-mono text-slate-950">{currency} {totalPayable.toFixed(2)}</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* Advanced Dual-Column Payment Details */}
                                        <div className="bg-slate-50 border border-slate-200 p-4 rounded-lg flex flex-row justify-between items-center gap-4">
                                            <div className="flex-1 w-full">
                                                <div className="text-[9px] sm:text-[10px] print:text-[10px] uppercase font-bold text-slate-500 mb-2 border-b border-slate-200 pb-1.5">Bank Transfer:</div>
                                                <div className="grid grid-cols-3 gap-2 text-[10px] sm:text-xs print:text-xs">
                                                    <div>
                                                        <span className="text-slate-500 text-[8px] sm:text-[9px] print:text-[9px] uppercase block">Bank Name</span>
                                                        <span className="font-bold text-slate-900">{bankName}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-slate-500 text-[8px] sm:text-[9px] print:text-[9px] uppercase block">Account Holder</span>
                                                        <span className="font-bold text-slate-900">{bankAccName}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-slate-500 text-[8px] sm:text-[9px] print:text-[9px] uppercase block">Account Number</span>
                                                        <span className="font-bold text-slate-900 font-mono text-[11px] sm:text-sm print:text-sm">{bankAccNo}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Seamless QR Code Container */}
                                            {paymentQr && (
                                                <div className="flex flex-col items-center justify-center p-1.5 bg-white border border-slate-200 rounded-lg shadow-sm shrink-0 w-24 h-28 sm:w-32 sm:h-36 print:w-32 print:h-36">
                                                    <div className="w-18 h-18 sm:w-24 sm:h-24 print:w-24 print:h-24 overflow-hidden rounded flex items-center justify-center bg-white">
                                                        <img src={paymentQr} className="w-full h-full object-contain" alt="Payment QR Code" />
                                                    </div>
                                                    <span className="text-[7px] sm:text-[8px] print:text-[8px] font-extrabold uppercase text-slate-400 mt-1 tracking-wider">Scan to Pay</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Custom Elegant Footer Sign-off */}
                                    <div className="border-t border-slate-100 pt-3 text-center text-[9px] text-slate-400 mt-4">
                                        Thank you for your business. Generated via Rain's Generator.
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>

                    {/* MOBILE TAB NAVIGATION (Hidden on Desktop & Print) */}
                    <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-slate-800 flex justify-around py-3 z-50 no-print">
                        <button 
                            onClick={() => setActiveTab('edit')} 
                            className={`flex flex-col items-center space-y-1 text-[10px] sm:text-xs font-semibold px-5 py-1.5 rounded-xl transition-all ${activeTab === 'edit' ? 'text-blue-500 bg-slate-900' : 'text-slate-400 hover:text-slate-200'}`}
                        >
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                            <span>📝 Edit Form</span>
                        </button>
                        <button 
                            onClick={() => setActiveTab('preview')} 
                            className={`flex flex-col items-center space-y-1 text-[10px] sm:text-xs font-semibold px-5 py-1.5 rounded-xl transition-all ${activeTab === 'preview' ? 'text-blue-500 bg-slate-900' : 'text-slate-400 hover:text-slate-200'}`}
                        >
                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <span>👁️ Preview A4</span>
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
